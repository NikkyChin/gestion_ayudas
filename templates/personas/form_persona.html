{% extends "base.html" %}

{% block title %}Nueva persona{% endblock %}

{% block content %}
<h1>Registrar persona</h1>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <hr>
    <h3>Convivientes</h3>

    <div id="convivientes-container"></div>

    <button type="button" onclick="agregarConviviente()">
        Agregar conviviente
    </button>

    <br><br>

    <button type="submit">Guardar</button>
</form>

<script>
function agregarConviviente() {
    const container = document.getElementById("convivientes-container");

    const index = container.children.length;

    const div = document.createElement("div");

    div.innerHTML = `
        <hr>
        <input type="text" name="convivientes[${index}][nombre]" placeholder="Nombre">
        <input type="text" name="convivientes[${index}][apellido]" placeholder="Apellido">
        <input type="text" name="convivientes[${index}][dni]" placeholder="DNI">
        <input type="text" name="convivientes[${index}][parentesco]" placeholder="Parentesco">
    `;

    container.appendChild(div);
}
</script>

{% endblock %}
