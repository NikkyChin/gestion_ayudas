{% extends "base.html" %}

{% block title %}Eliminar ayuda{% endblock %}

{% block content %}
<h1>Eliminar ayuda</h1>

<div class="tarjeta">
    <p>¿Seguro que quieres eliminar la ayuda <strong>{{ ayuda.nombre }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <a class="btn" type="submit">Sí, eliminar</a>
    </form>

    <br>
    <a href="{% url 'secretarias:mis_ayudas' %}">Cancelar</a>
</div>
{% endblock %}
