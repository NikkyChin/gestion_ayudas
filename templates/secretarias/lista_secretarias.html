{% extends "base.html" %}

{% block title %}Secretarías{% endblock %}

{% block content %}
<h1>Secretarías</h1>

<ul>
    {% for secretaria in secretarias %}
        <li>
            {{ secretaria.nombre }}
            - <a href="{% url 'secretarias:ayudas_por_secretaria' secretaria.id %}">Ver ayudas</a>
        </li>
    {% empty %}
        <li>No hay secretarías cargadas.</li>
    {% endfor %}
</ul>
{% endblock %}
