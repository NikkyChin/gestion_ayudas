{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h1>{{ titulo }}</h1>

<div class="tarjeta">
    {% if secretaria %}
        <p><strong>Secretaría:</strong> {{ secretaria.nombre }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 10px;">
                {{ form.errors }}
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit" class="btn">Guardar</button>
        <a class="btn" href="{% url 'secretarias:mis_ayudas' %}">Volver</a>
    </form>

</div>
{% endblock %}
