{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h1>{{ titulo }}</h1>

<div class="tarjeta">
    {% if secretaria %}
        <p><strong>Secretaría:</strong> {{ secretaria.nombre }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <a class="btn" type="submit">Guardar</a>
    </form>

    <br>
    <a href="{% url 'secretarias:mis_ayudas' %}">Volver</a>
</div>
{% endblock %}
